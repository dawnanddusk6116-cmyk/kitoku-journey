<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI Reflection | KITOKU OS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--card:#fffdf8;--rim:rgba(100,80,40,.15);--gold:#8a6820;--ink:#1c1208;--muted:#5d503d;--blue:#3d6491}
*{box-sizing:border-box;margin:0;padding:0}body{max-width:520px;margin:0 auto;background:var(--bg);color:var(--ink);font-family:'Noto Serif',serif;line-height:1.75;padding-bottom:42px}.topbar{position:sticky;top:0;background:rgba(247,244,239,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--rim);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:10}.brand{font-family:'Cormorant Garamond',serif;letter-spacing:.18em;color:var(--gold);font-size:1.08rem}.back{border:1px solid rgba(138,104,32,.35);border-radius:999px;color:var(--gold);text-decoration:none;font-size:.68rem;padding:7px 11px;background:rgba(255,255,255,.58)}.hero{padding:28px 22px 14px}.eyebrow{font-size:.66rem;letter-spacing:.22em;color:var(--blue);font-weight:800;margin-bottom:8px}h1{font-family:'Cormorant Garamond',serif;font-size:2.05rem;line-height:1.08;color:#314d73}.lead{font-size:.84rem;color:var(--muted);line-height:1.9;margin-top:12px}.section{margin:14px 18px 0;background:var(--card);border:1px solid var(--rim);border-radius:16px;padding:16px;box-shadow:0 10px 26px rgba(100,80,40,.04)}.label{font-size:.64rem;letter-spacing:.18em;color:var(--gold);font-weight:800;margin-bottom:8px}.field{margin-top:10px}.field label{display:block;font-size:.68rem;color:#4b300c;font-weight:800;margin-bottom:5px}textarea,select,input{width:100%;border:1px solid var(--rim);border-radius:10px;background:rgba(255,255,255,.72);padding:11px;color:var(--ink);font-family:'Noto Serif',serif;font-size:.78rem;line-height:1.7}textarea{min-height:94px;resize:vertical}.prompt{border:1px dashed rgba(61,100,145,.35);background:rgba(255,255,255,.66);border-radius:12px;padding:12px;white-space:pre-wrap;font-size:.72rem;line-height:1.85;margin-top:10px}.primary{width:100%;border:none;border-radius:10px;background:linear-gradient(135deg,#3d6491,#81a5cf);color:#fff;font-family:'Noto Serif',serif;font-weight:800;letter-spacing:.08em;padding:12px;margin-top:12px;cursor:pointer}.note{font-size:.64rem;color:var(--muted);line-height:1.75;margin-top:8px}
</style>
</head>
<body onload="init()">
<div class="topbar"><div class="brand">✦ KITOKU OS</div><a class="back" href="index.html">Back</a></div>
<main>
  <section class="hero">
    <div class="eyebrow">AI REFLECTION</div>
    <h1>Ask AI with your stars</h1>
    <p class="lead">Use AI as a mirror, not an oracle. This page creates a gentle prompt for self-understanding.</p>
  </section>
  <section class="section">
    <div class="label">CREATE YOUR PROMPT</div>
    <div class="field"><label>Your avatar or feeling</label><input id="avatar" placeholder="Example: Royal Sky, Crystal Water, or I feel stuck"></div>
    <div class="field"><label>What do you want to understand?</label><textarea id="concern" placeholder="Example: I want to understand why I get tired in relationships."></textarea></div>
    <div class="field"><label>Tone</label><select id="tone"><option value="Warm and practical">Warm and practical</option><option value="Deep and philosophical">Deep and philosophical</option><option value="Simple and gentle">Simple and gentle</option><option value="Direct but kind">Direct but kind</option></select></div>
    <button class="primary" onclick="buildPrompt()">Create prompt</button>
    <div class="prompt" id="prompt">Your AI prompt will appear here.</div>
    <button class="primary" onclick="copyPrompt()">Copy prompt</button>
    <div class="note">Paste this into ChatGPT, Claude, Gemini, Genspark, Manus, or your favorite AI.</div>
  </section>
</main>
<script>
function savedAvatarText(){
  const star=localStorage.getItem('kitoku_en_avatar_star');
  const name=localStorage.getItem('kitoku_en_avatar_name');
  const sub=localStorage.getItem('kitoku_en_avatar_sub');
  if(star&&name)return `${name} (${star}) - ${sub||'my KITOKU avatar'}`;
  return '';
}
function init(){
  const saved=savedAvatarText();
  if(saved)document.getElementById('avatar').value=saved;
  buildPrompt();
}
function buildPrompt(){
  const avatar=document.getElementById('avatar').value.trim()||'unknown';
  const concern=document.getElementById('concern').value.trim()||'I want to understand myself better.';
  const tone=document.getElementById('tone').value;
  document.getElementById('prompt').textContent=`You are a KITOKU guide.
Please help me understand myself with warmth, honesty, and practical wisdom.

My avatar / current feeling:
${avatar}

What I want to understand:
${concern}

Tone:
${tone}

Please do not flatter me or decide my fate.
Use this as a mirror for self-understanding.

Tell me:
1. What strength may already be present
2. Where I may be pushing myself too hard
3. What I should notice in relationships, work, or daily life
4. One small action I can take today
5. One short sentence I can keep as my compass`;
}
function copyPrompt(){navigator.clipboard.writeText(document.getElementById('prompt').textContent).then(()=>alert('Prompt copied.'))}
</script>
</body>
</html>
