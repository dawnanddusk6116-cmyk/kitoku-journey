<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f0ea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KITOKU">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="kitoku-manifest.json">
<link rel="apple-touch-icon" href="kitoku-icon-180.png">
<title>00 東洋思想の地図 | KITOKU Academy</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#f4f0ea;color:#4b2f12;font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
body{display:flex;flex-direction:column;min-height:100dvh}
a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;z-index:5;background:rgba(244,240,234,.96);backdrop-filter:blur(8px);border-bottom:1px solid #dfd3c3}
.topbar-inner{max-width:920px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{letter-spacing:.26em;font-size:1rem;color:#7a5017;white-space:nowrap}
.nav{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn{border:1px solid #d6bf93;border-radius:10px;padding:7px 11px;background:#fffaf0;color:#5b3a13;font-size:.86rem;font-weight:700}
.title{max-width:920px;width:100%;margin:0 auto;padding:12px 14px 10px}
.eyebrow{letter-spacing:.25em;color:#7b5ea7;font-size:.68rem;font-weight:700}
h1{font-size:1.12rem;line-height:1.45;margin:3px 0 0;font-weight:600}
.viewer{flex:1;min-height:0;padding:0 10px 12px}
.frame{width:100%;height:100%;min-height:calc(100dvh - 142px);border:1px solid #dfd3c3;border-radius:12px;background:#fffdf8}
.fallback{max-width:920px;margin:0 auto;padding:0 14px 14px;color:#6c5b47;font-size:.82rem}
.fallback a{text-decoration:underline;color:#5b3a13}
@media(max-width:560px){
  .brand{font-size:.92rem;letter-spacing:.2em}
  .btn{font-size:.82rem;padding:6px 9px}
  .viewer{padding:0 6px 10px}
  .frame{border-radius:8px;min-height:calc(100dvh - 134px)}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="top.html">KITOKU</a>
    <nav class="nav">
      <a class="btn" href="academy.html">← Academyへ</a>
      <a class="btn" href="top.html">入口へ</a>
    </nav>
  </div>
</header>
<section class="title">
  <div class="eyebrow">KITOKU ACADEMY</div>
  <h1>00 東洋思想の地図</h1>
</section>
<main class="viewer">
  <iframe class="frame" src="kitoku_academy_00.pdf" title="00 東洋思想の地図"></iframe>
</main>
<p class="fallback">PDFが表示されない場合は <a href="kitoku_academy_00.pdf">PDFを直接開く</a></p>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('kitoku-sw.js').catch(()=>{});});
}
</script>
</body>
</html>
