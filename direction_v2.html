<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>吉方位 | KITOKU@JOURNEY</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--card:#fff;--rim:rgba(100,80,40,.15);--gold:#8a6820;--goldlt:#5c4010;--snow:#1c1208;--mist:#4a3820;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--snow);font-family:'Noto Serif JP',serif;min-height:100dvh;max-width:480px;margin:0 auto;}

/* ヘッダー */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--rim);position:sticky;top:0;background:var(--bg);z-index:20;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.2em;color:var(--gold);}
.back-btn{background:rgba(100,80,40,.1);border:1px solid rgba(100,80,40,.3);color:var(--goldlt);font-size:.75rem;padding:7px 12px;border-radius:6px;cursor:pointer;}

/* 方位盤エリア（engine.jsのCSSに合わせる） */
.ban-section{padding:16px;}
.ban-section-lbl{font-size:.58rem;letter-spacing:.2em;color:rgba(196,160,67,.6);font-weight:600;text-align:center;margin-bottom:8px;}

/* 日付ナビ */
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.date-nav-btn{background:none;border:1px solid var(--rim);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--mist);font-size:.9rem;font-family:'Noto Serif JP',serif;}
.date-nav-lbl{font-size:.78rem;color:var(--goldlt);font-weight:700;text-align:center;flex:1;}

/* 向き切替 */
.orient-wrap{display:flex;gap:8px;margin-bottom:10px;}
.orient-btn{flex:1;padding:6px;border-radius:20px;border:1px solid var(--rim);background:transparent;font-size:.68rem;color:var(--mist);cursor:pointer;font-family:'Noto Serif JP',serif;}
.orient-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;}

/* 盤タブ */
.ban-tabs{display:flex;gap:6px;margin-bottom:10px;}
.ban-tab{flex:1;padding:7px;border-radius:20px;border:1px solid var(--rim);background:transparent;font-size:.7rem;color:var(--mist);cursor:pointer;font-family:'Noto Serif JP',serif;}
.ban-tab.active{background:rgba(100,80,40,.12);border-color:rgba(100,80,40,.3);color:var(--goldlt);font-weight:700;}

/* noData */
.no-data{text-align:center;padding:60px 20px;color:var(--mist);}
.no-data-btn{display:inline-block;background:rgba(100,80,40,.1);border:1px solid rgba(100,80,40,.3);border-radius:10px;padding:10px 24px;font-size:.82rem;color:var(--goldlt);font-weight:700;text-decoration:none;}
.footer{text-align:center;font-size:.58rem;color:var(--mist);padding:24px 16px 40px;opacity:.7;}

/* ============ 方位盤CSS（index.htmlから移植） ============ */
.ban-section{padding:16px;}
.ban-section-lbl{
  font-size:.78rem;letter-spacing:.22em;color:rgba(196,160,67,.75);
  text-align:center;margin-bottom:12px;font-weight:600;
}
.ban-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.ban-tab{
  background:rgba(255,255,255,.04);border:1px solid var(--rim);
  border-radius:20px;padding:8px 18px;font-size:.82rem;letter-spacing:.1em;
  color:var(--mist);cursor:pointer;transition:all .25s;
}
.ban-tab.active{background:rgba(196,160,67,.15);border-color:rgba(196,160,67,.5);color:var(--goldlt);}

/* 八角形風盤面 */
.compass-wrap{position:relative;width:100%;max-width:320px;margin:0 auto;}
.compass-grid{
  display:grid;grid-template-columns:1fr 1.4fr 1fr;
  grid-template-rows:1fr 1.4fr 1fr;
  gap:4px;aspect-ratio:1;
  border:1px solid rgba(196,160,67,.2);
  border-radius:10px;padding:6px;
  background:rgba(196,160,67,.03);
}
.cell{
  border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  position:relative;transition:all .2s;cursor:pointer;
  border:1px solid transparent;
}
.cell:active{transform:scale(.96);}
.cell-center{border-radius:50%;background:rgba(196,160,67,.1);border:1px solid rgba(196,160,67,.3);}

/* 吉方（ゴールド強調） */
.cell-kichi{background:rgba(196,160,67,.12);border-color:rgba(196,160,67,.45);}
.cell-daikichi{background:rgba(196,160,67,.18);border-color:rgba(196,160,67,.6);}
.cell-saikokichi{background:rgba(196,160,67,.26);border-color:rgba(196,160,67,.8);}

/* 凶方（色なし・文字のみ） */
.cell-kyo{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06);}

/* 普通 */
.cell-normal{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06);}

.cell-num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500;line-height:1;}
.cell-kichi .cell-num,.cell-daikichi .cell-num{color:var(--goldlt);}
.cell-saikokichi .cell-num{color:#ffe066;}
.cell-kyo .cell-num{color:rgba(200,215,240,.45);}
.cell-normal .cell-num{color:rgba(200,215,240,.45);}
.cell-center .cell-num{color:var(--goldlt);}

.cell-name{font-size:.5rem;letter-spacing:.05em;color:rgba(220,232,255,.35);line-height:1;}
.cell-kichi .cell-name,.cell-daikichi .cell-name,.cell-saikokichi .cell-name{color:rgba(196,160,67,.7);}
.cell-kyo .cell-name{color:rgba(200,215,240,.3);}

/* 方位ラベル（盤の外） */
.compass-outer{position:relative;margin:0 auto;max-width:320px;}
.dir-label{
  position:absolute;font-size:.75rem;font-weight:700;letter-spacing:.05em;
  text-align:center;line-height:1.3;
}
.dir-label.kichi{color:var(--goldlt);}
.dir-label.daikichi{color:#ffe066;}
.dir-label.kyo{color:rgba(200,215,240,.5);font-weight:500;}
.dir-label.normal{color:rgba(200,215,240,.35);font-weight:400;}

/* 吉方リスト */
.kichi-list{margin:4px 16px 0;display:flex;flex-direction:column;gap:8px;}
.kichi-item{
  background:var(--card);border:1px solid var(--rim);border-radius:10px;
  padding:14px 16px;cursor:pointer;transition:all .25s;
  display:flex;align-items:center;gap:12px;
}
.kichi-item.dai{border-color:rgba(230,150,20,.45);background:rgba(230,150,20,.06);}
.kichi-item.saiko{border-color:rgba(220,160,20,.6);background:rgba(220,160,20,.1);}
.kichi-item:active{transform:scale(.98);}
.kichi-dir-badge{
  width:44px;height:44px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(232,116,138,.15);border:1px solid rgba(232,116,138,.4);
}
.kichi-item.dai .kichi-dir-badge{background:rgba(230,150,20,.15);border-color:rgba(230,150,20,.4);}
.kichi-item.saiko .kichi-dir-badge{background:rgba(220,160,20,.2);border-color:rgba(220,160,20,.5);}
.kichi-dir{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--kichi);font-weight:600;}
.kichi-item.dai .kichi-dir,.kichi-item.saiko .kichi-dir{color:#e8c840;}
.kichi-dir-jp{font-size:.72rem;color:var(--mist);font-weight:600;}
.kichi-info{flex:1;}
.kichi-rank{font-size:.86rem;letter-spacing:.1em;color:var(--kichi);margin-bottom:5px;font-weight:800;}
.kichi-item.dai .kichi-rank,.kichi-item.saiko .kichi-rank{color:#e8c840;}
.kichi-star{font-size:1.02rem;color:var(--snow);font-weight:700;}
.kichi-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.kbadge{font-size:.52rem;padding:2px 7px;border-radius:10px;background:rgba(196,160,67,.1);border:1px solid rgba(196,160,67,.25);color:var(--gold);}
.kichi-tap{font-size:.72rem;color:rgba(196,160,67,.6);margin-top:6px;}

/* 凶方リスト */
.kyo-list{margin:12px 16px 0;background:rgba(80,90,110,.1);border-radius:10px;border:1px solid rgba(80,90,110,.25);overflow:hidden;}
.kyo-header{padding:13px 16px;font-size:.82rem;letter-spacing:.1em;color:var(--kyo);display:flex;align-items:center;gap:8px;cursor:pointer;}
.kyo-body{padding:0 14px 12px;display:none;}
.kyo-body.open{display:block;}
.kyo-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.kyo-row:last-child{border-bottom:none;}
.kyo-dir{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:rgba(160,170,190,.7);width:24px;}
.kyo-name{font-size:.8rem;color:rgba(160,170,190,.7);}

/* 注意書き */
.ryuha-note{
  margin:12px 16px 0;padding:10px 14px;
  background:rgba(196,160,67,.04);border:1px solid rgba(196,160,67,.12);
  border-radius:8px;font-size:.6rem;color:rgba(220,232,255,.4);
  line-height:1.9;letter-spacing:.04em;
}

/* ── セクション区切り ── */
.section{margin:16px 16px 0;background:var(--card);border:1px solid var(--rim);border-radius:var(--radius);overflow:hidden;}
.section-head{padding:14px 16px;border-bottom:1px solid var(--rim);}
.section-eyebrow{font-size:.72rem;letter-spacing:.18em;color:rgba(196,160,67,.65);margin-bottom:5px;}
.section-title{font-size:1.02rem;letter-spacing:.06em;color:var(--goldlt);font-weight:600;}
.section-body{padding:14px 16px;}

/* ── AI活用ポップアップ内容 ── */
.ai-hint{
  background:rgba(196,160,67,.06);border:1px dashed rgba(196,160,67,.25);
  border-radius:8px;padding:12px 14px;margin-top:10px;
}
.ai-hint-title{font-size:.65rem;letter-spacing:.12em;color:var(--gold);margin-bottom:6px;}
.ai-prompt-box{
  background:rgba(0,0,0,.3);border-radius:6px;padding:10px 12px;
  font-size:.7rem;color:rgba(220,232,255,.75);line-height:1.9;
  border-left:2px solid rgba(196,160,67,.3);margin-bottom:8px;
}
.ai-copy-btn{
  background:rgba(196,160,67,.1);border:1px solid rgba(196,160,67,.3);
  border-radius:4px;padding:6px 14px;font-size:.62rem;color:var(--gold);
  cursor:pointer;letter-spacing:.08em;
}

/* ── 深化セクション（名前入力への誘導） ── */
.deepen-section{
  margin:16px 16px 0;padding:20px;
  background:linear-gradient(135deg,rgba(196,160,67,.06),rgba(196,160,67,.02));
  border:1px solid rgba(196,160,67,.2);border-radius:var(--radius);
  text-align:center;
}
.deepen-icon{font-size:1.6rem;margin-bottom:8px;}
.deepen-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--goldlt);letter-spacing:.1em;margin-bottom:8px;}
.deepen-desc{font-size:.82rem;color:var(--mist);line-height:2;margin-bottom:16px;}
.deepen-btn{
  display:inline-block;background:rgba(196,160,67,.12);border:1px solid rgba(196,160,67,.4);
  border-radius:6px;padding:14px 32px;font-size:.9rem;letter-spacing:.15em;
  color:var(--goldlt);cursor:pointer;transition:all .25s;
}
.deepen-btn:hover{background:rgba(196,160,67,.22);}

/* ── ポップアップ ── */
.popup-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  align-items:flex-end;justify-content:center;
}
.popup-overlay.open{display:flex;}
.popup-sheet{
  background:#12152e;border-radius:20px 20px 0 0;
  border-top:1px solid rgba(196,160,67,.3);
  width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;
  padding:0 0 env(safe-area-inset-bottom,20px);
  animation:slideUp .3s ease;
  margin:0 auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0;}
.sheet-head{padding:16px 20px 12px;border-bottom:1px solid rgba(196,160,67,.12);}
.sheet-dir{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--goldlt);letter-spacing:.1em;}
.sheet-star{font-size:1rem;color:var(--mist);margin-top:6px;}
.sheet-rank{font-size:.95rem;color:var(--kichi);margin-top:8px;font-weight:700;}
.sheet-body{padding:20px 22px;}

/* 飲食提案カード */
.food-title{font-size:.72rem;letter-spacing:.12em;color:var(--gold);margin-bottom:12px;font-weight:800;}
.food-cards{display:flex;flex-direction:column;gap:8px;}
.food-card{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:12px;
}
.food-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px;}
.food-name{font-size:.92rem;color:var(--snow);margin-bottom:5px;font-weight:700;letter-spacing:.01em;}
.food-reason{font-size:.78rem;color:var(--mist);line-height:1.8;}
.food-why-btn{
  margin-top:6px;background:none;border:1px solid rgba(196,160,67,.25);
  border-radius:4px;padding:4px 10px;font-size:.58rem;color:var(--gold);cursor:pointer;
}

.gogyou-box{
  margin-top:14px;padding:12px 14px;
  background:rgba(196,160,67,.05);border:1px solid rgba(196,160,67,.15);
  border-radius:8px;
}
.gogyou-title{font-size:.82rem;letter-spacing:.12em;color:var(--gold);margin-bottom:8px;font-weight:800;}
.gogyou-text{font-size:.9rem;color:var(--snow);line-height:2.1;}

/* ── フッター ── */
footer{
  text-align:center;padding:20px 16px env(safe-area-inset-bottom,20px);
  font-size:.55rem;letter-spacing:.18em;color:var(--mist);opacity:.6;
}
footer .disclaimer{
  display:block;font-size:.55rem;letter-spacing:.04em;line-height:1.9;
  margin-top:10px;color:rgba(200,215,240,.55);
}
[data-theme="light"] footer .disclaimer{
  color:rgba(40,28,8,.6);
}
[data-theme="light"] footer{
  color:rgba(40,28,8,.5);
}

/* ── ローディング ── */
.loading{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(10,12,24,.92);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.loading.show{display:flex;}
.loading-symbol{font-size:2rem;animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-text{font-size:.68rem;letter-spacing:.2em;color:var(--gold);}

/* ── テーマ切り替え ── */
:root{
  --bg:#0a0c18;--card:#12152a;--rim:rgba(212,175,55,.18);
  --gold:#c4a043;--goldlt:#e8c96a;--snow:rgba(220,232,255,.82);
  --mist:rgba(220,232,255,.55);--kichi:#e8748a;--kyo:rgba(180,190,210,.6);
  --note-bg:rgba(196,160,67,.04);--note-border:rgba(196,160,67,.15);
  --section-body-color:rgba(220,232,255,.65);
}
[data-theme="dark"]{
  --bg:#0a0c18;--card:#12152a;--rim:rgba(212,175,55,.18);
  --gold:#c4a043;--goldlt:#e8c96a;--snow:rgba(220,232,255,.82);
  --mist:rgba(220,232,255,.55);--kichi:#e8748a;--kyo:rgba(180,190,210,.6);
  --note-bg:rgba(196,160,67,.04);--note-border:rgba(196,160,67,.15);
  --section-body-color:rgba(220,232,255,.65);
}
[data-theme="light"]{
  --bg:#f7f4ef;--card:#ffffff;--rim:rgba(100,80,40,.15);
  --gold:#8a6820;--goldlt:#5c4010;--snow:#1c1208;
  --mist:#4a3820;--kichi:#b82840;--kyo:rgba(70,70,90,.55);
  --note-bg:rgba(100,80,40,.05);--note-border:rgba(100,80,40,.18);
  --section-body-color:#3a2a10;
}
[data-theme="light"] .app-header{background:rgba(247,244,239,.96);border-bottom-color:rgba(100,80,40,.12);}
[data-theme="light"] .toolbar{background:#ffffff;border-bottom-color:rgba(100,80,40,.1);}

/* ライトモード：方位盤セル */
[data-theme="light"] .cell-normal{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);}
[data-theme="light"] .cell-kyo{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);}
[data-theme="light"] .cell-kichi{background:rgba(120,90,20,.12);border-color:rgba(120,90,20,.4);}
[data-theme="light"] .cell-daikichi{background:rgba(120,90,20,.18);border-color:rgba(120,90,20,.55);}
[data-theme="light"] .cell-saikokichi{background:rgba(120,90,20,.26);border-color:rgba(120,90,20,.7);}
[data-theme="light"] .cell-kichi .cell-num,[data-theme="light"] .cell-daikichi .cell-num,[data-theme="light"] .cell-saikokichi .cell-num{color:#5a3e08;}
[data-theme="light"] .cell-kyo .cell-num{color:rgba(60,50,40,.4);}
[data-theme="light"] .cell-normal .cell-num{color:rgba(60,50,40,.4);}
[data-theme="light"] .cell-kichi .cell-name,[data-theme="light"] .cell-daikichi .cell-name{color:rgba(90,62,8,.7);}
[data-theme="light"] .compass-grid{background:rgba(120,90,20,.04);border-color:rgba(120,90,20,.2);}

/* ライトモード：方位ラベル */
[data-theme="light"] .dir-label.kichi,[data-theme="light"] .dir-label.daikichi{color:#5a3e08;}
[data-theme="light"] .dir-label.kyo{color:rgba(60,50,40,.45);}
[data-theme="light"] .dir-label.normal{color:rgba(60,50,40,.35);}

[data-theme="light"] .popup-sheet{background:#fefcf8;border-color:rgba(100,80,40,.2);}
[data-theme="light"] input[type="date"]{background:#fff;color:#1c1208;border-color:rgba(100,80,40,.25);}
[data-theme="light"] .kyo-list{background:rgba(100,100,120,.06);border-color:rgba(100,100,120,.15);}
[data-theme="light"] #settingPanel > div{background:#fefcf8!important;}
[data-theme="light"] .save-note{color:rgba(60,40,10,.55)!important;}
[data-theme="light"] footer{color:rgba(60,40,10,.45)!important;}
[data-theme="light"] .ryuha-note{color:#3a2a10!important;}
[data-theme="light"] .kyo-header{color:rgba(50,50,70,.75)!important;}
[data-theme="light"] .kyo-dir{color:rgba(50,50,70,.7)!important;}
[data-theme="light"] .kyo-name{color:rgba(50,50,70,.7)!important;}
[data-theme="light"] .ai-note-text{color:rgba(40,28,8,.55)!important;}
[data-theme="light"] .slide-num{color:rgba(100,80,40,.6)!important;}
[data-theme="light"] .loading-text{color:#7a5a10!important;}

/* ── フォントサイズ切り替え ── */
html[data-fontsize="m"],html[data-fontsize="m"] body{font-size:18px;}
html[data-fontsize="l"],html[data-fontsize="l"] body{font-size:21px;}

/* ── ツールバー（テーマ・フォント） ── */
.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-bottom:1px solid var(--rim);
  background:var(--card);
}
.tb-label{font-size:.65rem;color:var(--mist);letter-spacing:.1em;flex-shrink:0;}
.tb-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--rim);
  border-radius:16px;padding:5px 12px;font-size:.7rem;color:var(--mist);
  cursor:pointer;transition:all .2s;letter-spacing:.06em;
}
.tb-btn.active{background:rgba(196,160,67,.15);border-color:rgba(196,160,67,.5);color:var(--goldlt);font-weight:700;}
[data-theme="light"] .tb-btn{background:rgba(0,0,0,.04);border-color:rgba(120,90,20,.2);}
[data-theme="light"] .tb-btn.active{background:rgba(120,90,20,.12);border-color:rgba(120,90,20,.5);}

/* ── 自分の星カード（結果表示） ── */
.mystar-card{
  margin:12px 16px 0;
  background:var(--card);border:1px solid var(--rim);border-radius:14px;
  overflow:hidden;
}
.mystar-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--rim);
  display:flex;align-items:center;gap:10px;
}
.mystar-num{
  font-family:'Cormorant Garamond',serif;font-size:2.2rem;
  line-height:1;flex-shrink:0;
}
.mystar-title{flex:1;}
.mystar-name{font-size:1rem;color:var(--snow);font-weight:600;letter-spacing:.06em;}
.mystar-sub{font-size:.72rem;color:var(--mist);margin-top:2px;}
.mystar-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;
}

.compass-grid{
  display:grid;grid-template-columns:1fr 1.3fr 1fr;
  grid-template-rows:1fr 1.3fr 1fr;
  gap:4px;aspect-ratio:1;max-width:260px;margin:0 auto;
}

<!-- kitoku-engine.js 読み込み -->
<script src="kitoku-engine.js"></script>
<script>
// ============================================================
// direction_v2.html — UIのみ（エンジンはkitoku-engine.jsを使用）
// ============================================================

// 現在の表示状態
let curDate = null;
let curBan = 'day';

// gStateを初期化（engine.jsのrenderBanが参照する）
var gState = {
  orient: 'south',
  tsukimeiSatsu: 'off',
  soukouOff: false,
  teiiAsKyo: false,
  kichakuWarn: false,
  seasonAlert: true,
  honmei: null,
  tsukimei: null,
  ty:null, tm:null, td:null,
  dayCenter:null, monthCenter:null, yearCent:null,
  kanshi: '',
  by:null, bm:null, bd:null,
  kY:null, kM:null,
  dayDirData: null
};

function init(){
  // localStorage設定を読み込み
  try{
    gState.orient = localStorage.getItem('kitoku-orient') || 'south';
    gState.tsukimeiSatsu = localStorage.getItem('kitoku-tsukimei-satsu') || 'off';
    gState.teiiAsKyo = localStorage.getItem('kitoku-teii-kyo') === '1';
    gState.soukouOff = localStorage.getItem('kitoku-soukou-off') === '1';
    gState.kichakuWarn = localStorage.getItem('kitoku-kichaku-warn') === '1';
    gState.seasonAlert = localStorage.getItem('kitoku-season-alert') !== '0';
  }catch(e){}

  // 向きボタン反映
  document.getElementById('orient-s').classList.toggle('active', gState.orient==='south');
  document.getElementById('orient-n').classList.toggle('active', gState.orient==='north');

  const birth = localStorage.getItem('kitoku-birth');
  if(!birth){
    document.getElementById('noData').style.display='block';
    return;
  }

  const arr = birth.split('-').map(Number);
  const [by,bm,bd=1] = arr;
  if(!by||!bm){ document.getElementById('noData').style.display='block'; return; }

  // 今日の日付（JST）
  const now = new Date();
  const jst = new Date(now.getTime()+9*3600000);
  curDate = new Date(jst.getUTCFullYear(), jst.getUTCMonth(), jst.getUTCDate());

  // 計算
  const {kY,kM} = getKD(by,bm,bd);
  const h = calcHonmei(kY);
  const t = calcTsukimei(h,kM);
  const TAICHUU={1:9,9:1,2:6,6:2,3:7,7:3,4:8,8:4};
  const tFK = (h===t&&TAICHUU[t])?TAICHUU[t]:t;

  gState.by=by; gState.bm=bm; gState.bd=bd;
  gState.kY=kY; gState.kM=kM;
  gState.honmei=h; gState.tsukimei=tFK;

  // テーマ・フォントサイズ復元
  try{
    const t=localStorage.getItem('kitoku-theme')||'dark';
    setTheme(t);
    const fs=localStorage.getItem('kitoku-fontsize')||'s';
    setFontSize(fs);
  }catch(e){}

  document.getElementById('noData').style.display='none';
  document.getElementById('mainContent').style.display='block';

  renderPage();
}

function renderPage(){
  const ty = curDate.getFullYear();
  const tm = curDate.getMonth()+1;
  const td = curDate.getDate();

  // gStateに今日の計算値を設定
  gState.ty=ty; gState.tm=tm; gState.td=td;
  gState.dayCenter   = getDayCenter(ty,tm,td);
  gState.monthCenter = getMonthCenter(ty,tm,td);
  gState.yearCent    = yearCenter(ty);
  gState.currentBan  = curBan;

  // 干支
  const dc = getDayStem(ty,tm,td);
  const db = getDayBranch(ty,tm,td);
  const KAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const SHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  gState.kanshi = KAN[dc]+SHI[db];

  // 日付ナビラベル
  const weekday=['日','月','火','水','木','金','土'];
  const wd = curDate.getDay();
  document.getElementById('banNavLabel').textContent =
    `${ty}年${tm}月${td}日（${weekday[wd]}） ${gState.kanshi}`;

  // タブ
  ['day','month','year'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===curBan);
  });

  // 方位盤を描画（engine.jsのrenderBan）
  renderBan(curBan);
}

function switchBan(type){
  curBan = type;
  renderPage();
}

function navDate(d){
  curDate = new Date(curDate.getTime() + d*86400000);
  renderPage();
}

function setOrient(dir){
  gState.orient = dir;
  try{ localStorage.setItem('kitoku-orient', dir); }catch(e){}
  document.getElementById('orient-s').classList.toggle('active', dir==='south');
  document.getElementById('orient-n').classList.toggle('active', dir==='north');
  renderPage();
}


function setTheme(t){
  document.getElementById('appWrap')?.setAttribute('data-theme',t);
  document.body.setAttribute('data-theme',t);
  try{localStorage.setItem('kitoku-theme',t);}catch(e){}
}
function setFontSize(s){
  const map={s:'15px',m:'17px',l:'19px'};
  document.documentElement.style.fontSize = map[s]||'15px';
  try{localStorage.setItem('kitoku-fontsize',s);}catch(e){}
}
function openSettings(){
  // 設定値を反映
  const tm = document.getElementById('sw-tsukimei-satsu');
  if(tm) tm.value = gState.tsukimeiSatsu||'off';
  const teii = document.getElementById('sw-teii');
  if(teii) teii.checked = gState.teiiAsKyo||false;
  const soukou = document.getElementById('sw-soukou');
  if(soukou) soukou.checked = !(gState.soukouOff||false);
  document.getElementById('settingsPanel').style.display='block';
  document.body.style.overflow='hidden';
}
function closeSettings(){
  document.getElementById('settingsPanel').style.display='none';
  document.body.style.overflow='';
}
function saveSetting(key, val){
  gState[key] = val;
  const lsMap = {
    tsukimeiSatsu:'kitoku-tsukimei-satsu',
    teiiAsKyo:'kitoku-teii-kyo',
    soukouOff:'kitoku-soukou-off'
  };
  try{
    if(lsMap[key]) localStorage.setItem(lsMap[key], typeof val==='boolean'?(val?'1':'0'):val);
  }catch(e){}
  renderPage();
}
function toggleKyo(){
  const body = document.getElementById('kyoBody');
  const arrow = document.getElementById('kyoArrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(arrow) arrow.textContent = isOpen?'▶':'▼';
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
}else{
  init();
}
</script>

<!-- 設定パネル -->
<div id="settingsPanel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;">
  <div style="background:var(--bg);border-radius:16px 16px 0 0;padding:24px 20px 60px;position:absolute;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;max-height:85vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-size:1rem;font-weight:700;color:var(--goldlt);">設定</div>
      <button onclick="closeSettings()" style="background:rgba(100,80,40,.1);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:.9rem;color:var(--mist);">✕</button>
    </div>

    <!-- 流派設定 -->
    <div style="font-size:.6rem;letter-spacing:.14em;color:var(--gold);margin-bottom:10px;">✦ 流派の設定</div>
    <div style="background:rgba(196,160,67,.06);border:1px solid rgba(196,160,67,.2);border-radius:10px;padding:14px;margin-bottom:12px;font-size:.72rem;color:var(--mist);line-height:2;">
      KITOKUは「凶」で縛りません。他流派との違いも設定で確認できます。
    </div>

    <!-- 月命的殺 -->
    <div style="background:var(--card);border:1px solid var(--rim);border-radius:10px;padding:14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:.78rem;font-weight:700;margin-bottom:2px;">月命的殺・月命殺</div>
          <div style="font-size:.62rem;color:var(--mist);">月命星の対面・同位を凶方に追加</div>
        </div>
        <select id="sw-tsukimei-satsu" onchange="saveSetting('tsukimeiSatsu',this.value)" style="font-size:.72rem;border:1px solid var(--rim);border-radius:6px;padding:4px 8px;background:var(--bg);color:var(--snow);">
          <option value="off">大人（本命星のみ）</option>
          <option value="on">厳密（月命星も含む）</option>
        </select>
      </div>
    </div>

    <!-- 定位対冲 -->
    <div style="background:var(--card);border:1px solid var(--rim);border-radius:10px;padding:14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:.78rem;font-weight:700;margin-bottom:2px;">定位対冲を凶方に含める</div>
          <div style="font-size:.62rem;color:var(--mist);">他流派設定。KITOKUはデフォルトOFF</div>
        </div>
        <input type="checkbox" id="sw-teii" onchange="saveSetting('teiiAsKyo',this.checked)" style="width:20px;height:20px;cursor:pointer;">
      </div>
    </div>

    <!-- 相剋 -->
    <div style="background:var(--card);border:1px solid var(--rim);border-radius:10px;padding:14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:.78rem;font-weight:700;margin-bottom:2px;">相剋を吉方から除く</div>
          <div style="font-size:.62rem;color:var(--mist);">他流派設定。KITOKUはデフォルトOFF</div>
        </div>
        <input type="checkbox" id="sw-soukou" onchange="saveSetting('soukouOff',!this.checked)" style="width:20px;height:20px;cursor:pointer;">
      </div>
    </div>

  </div>
</div>
</body>
