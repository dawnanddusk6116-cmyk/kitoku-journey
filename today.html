<style>
:root{--bg:#f7f4ef;--card:#fff;--rim:rgba(100,80,40,.15);--gold:#8a6820;--goldlt:#5c4010;--snow:#1c1208;--mist:#4a3820;--r:14px;--amber:rgba(196,160,67,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);min-height:100dvh;}body{background:var(--bg);color:var(--snow);font-family:'Noto Serif JP',serif;min-height:100dvh;max-width:480px;margin:0 auto;}

/* ヘッダー */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--rim);position:sticky;top:0;background:var(--bg);z-index:20;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.2em;color:var(--gold);}
.back-btn{background:rgba(100,80,40,.1);border:1px solid rgba(100,80,40,.3);color:var(--goldlt);font-size:.75rem;padding:7px 12px;border-radius:6px;cursor:pointer;}

/* セクション共通 */
.section{padding:16px 16px 0;}
.sec-label{font-size:.62rem;letter-spacing:.16em;color:var(--gold);font-weight:800;margin-bottom:10px;}
.card{background:var(--card);border:1px solid var(--rim);border-radius:var(--r);padding:16px;margin-bottom:12px;}

/* ① 今日の一言 */
.kotoba-card{background:linear-gradient(135deg,rgba(196,160,67,.1),rgba(196,160,67,.04));border:1px solid rgba(196,160,67,.3);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.kotoba-date{font-size:.62rem;letter-spacing:.14em;color:var(--gold);margin-bottom:8px;}
.kotoba-text{font-size:.9rem;line-height:2.1;color:var(--goldlt);}
.kotoba-kanshi{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:rgba(100,80,40,.3);float:right;margin-top:-4px;}

/* ② 今日の色 */
.color-swatch{width:100%;height:56px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;letter-spacing:.1em;}
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.color-item{background:rgba(100,80,40,.04);border:1px solid var(--rim);border-radius:8px;padding:10px 12px;}
.color-item-label{font-size:.55rem;letter-spacing:.12em;color:var(--gold);margin-bottom:4px;}
.color-item-text{font-size:.75rem;color:var(--snow);line-height:1.7;}

/* ③ 香り */
.scene-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.scene-tab{border:1px solid var(--rim);background:transparent;border-radius:20px;padding:6px 12px;font-size:.68rem;color:var(--mist);cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .2s;}
.scene-tab.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.scene-tab:active{transform:scale(.97);}

.scent-result{min-height:120px;border-radius:10px;background:rgba(100,80,40,.04);border:1px solid var(--rim);padding:14px;}
.scent-loading{text-align:center;padding:30px 0;color:var(--mist);font-size:.78rem;}
.scent-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--goldlt);margin-bottom:4px;}
.scent-reason{font-size:.78rem;color:var(--snow);line-height:2;margin-bottom:10px;}
.scent-how{font-size:.7rem;color:var(--mist);line-height:1.9;padding:8px 10px;background:rgba(100,80,40,.04);border-radius:8px;margin-bottom:10px;}
.scent-how-label{font-size:.55rem;letter-spacing:.1em;color:var(--gold);margin-bottom:4px;}
.scent-use-grid{display:grid;gap:8px;margin-bottom:10px;}
.scent-use-card{border:1px solid var(--rim);border-radius:8px;padding:9px 10px;background:rgba(255,255,255,.42);}
.scent-use-label{font-size:.56rem;letter-spacing:.1em;color:var(--gold);font-weight:700;margin-bottom:4px;}
.scent-use-text{font-size:.68rem;color:var(--mist);line-height:1.8;}

/* アフィリエイト枠 */
.affiliate-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.affiliate-btn{border-radius:8px;padding:10px 8px;text-align:center;font-size:.68rem;font-weight:700;font-family:'Noto Serif JP',serif;border:1px solid;position:relative;overflow:hidden;}
.affiliate-btn.celes{background:rgba(232,112,160,.08);border-color:rgba(232,112,160,.3);color:#c04080;}
.affiliate-btn.amazon{background:rgba(255,153,0,.08);border-color:rgba(255,153,0,.3);color:#c07000;}
.affiliate-badge{position:absolute;top:0;right:0;background:rgba(100,80,40,.15);font-size:.44rem;padding:2px 5px;color:var(--mist);}

/* リトライボタン */
.retry-btn{width:100%;background:rgba(100,80,40,.08);border:1px solid rgba(100,80,40,.2);border-radius:8px;padding:10px;font-size:.72rem;color:var(--goldlt);cursor:pointer;font-family:'Noto Serif JP',serif;margin-top:8px;}
.retry-btn:active{background:rgba(100,80,40,.15);}

/* ④ キーワード */
.keyword-card{background:linear-gradient(135deg,rgba(100,80,40,.08),rgba(100,80,40,.03));border:1px solid rgba(100,80,40,.2);border-radius:var(--r);padding:16px;margin-bottom:12px;text-align:center;}
.keyword-text{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--goldlt);letter-spacing:.08em;line-height:1.9;}
.keyword-sub{font-size:.62rem;color:var(--mist);margin-top:6px;line-height:1.8;}

/* 未登録 */
.no-data{text-align:center;padding:60px 20px;color:var(--mist);}
.no-data-icon{font-size:2.5rem;margin-bottom:12px;}
.no-data-btn{display:inline-block;background:linear-gradient(135deg,rgba(100,80,40,.15),rgba(100,80,40,.06));border:1px solid rgba(100,80,40,.4);border-radius:10px;padding:10px 24px;font-size:.82rem;color:var(--goldlt);font-weight:700;text-decoration:none;}

.footer{text-align:center;font-size:.58rem;color:var(--mist);padding:24px 16px 40px;opacity:.7;}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--rim);position:sticky;top:0;background:var(--bg);z-index:20;}
.header-reset{background:rgba(196,160,67,.1);border:1px solid rgba(196,160,67,.4);color:var(--goldlt);font-size:.8rem;padding:9px 16px;border-radius:6px;cursor:pointer;letter-spacing:.1em;font-weight:600;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--rim);background:var(--card);}
.tb-label{font-size:.65rem;color:var(--mist);letter-spacing:.1em;flex-shrink:0;}
.tb-btn{background:rgba(255,255,255,.05);border:1px solid var(--rim);border-radius:16px;padding:5px 12px;font-size:.7rem;color:var(--mist);cursor:pointer;transition:all .2s;letter-spacing:.06em;}
.tb-btn.active{background:rgba(196,160,67,.15);border-color:rgba(196,160,67,.5);color:var(--goldlt);font-weight:700;}

/* ── ダークモード ── */
[data-theme="dark"]{--bg:#0a0c18;--card:#12152a;--rim:rgba(212,175,55,.18);--gold:#c4a043;--goldlt:#e8c96a;--snow:rgba(220,232,255,.82);--mist:rgba(220,232,255,.55);}
[data-theme="dark"] .toolbar{background:var(--card);border-bottom-color:var(--rim);}
[data-theme="dark"] .tb-btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--mist);}
[data-theme="dark"] .tb-btn.active{background:rgba(196,160,67,.25);border-color:rgba(196,160,67,.6);color:var(--goldlt);}
[data-theme="dark"] .app-header,[data-theme="dark"] .hdr{background:var(--bg);border-bottom-color:var(--rim);}
[data-theme="dark"] .card{background:var(--card);border-color:var(--rim);}
[data-theme="dark"] .color-swatch{border:1px solid rgba(212,175,55,.22);}
[data-theme="dark"] .scent-use-card{background:rgba(255,255,255,.055);border-color:rgba(212,175,55,.18);}
[data-theme="dark"] .scent-use-text{color:rgba(232,238,255,.76);}
[data-theme="dark"] .scent-how{background:rgba(255,255,255,.04);color:rgba(232,238,255,.72);}
[data-theme="dark"] .affiliate-btn.celes{background:rgba(232,112,160,.1);color:#f0a0bf;}
[data-theme="dark"] .affiliate-btn.amazon{background:rgba(255,153,0,.1);color:#f0bf6a;}
[data-theme="dark"] .retry-btn{background:rgba(255,255,255,.045);border-color:rgba(212,175,55,.18);}
[data-theme="light"] .toolbar{background:#ffffff;border-bottom-color:rgba(100,80,40,.1);}
[data-theme="light"] .tb-btn{background:rgba(0,0,0,.04);border-color:rgba(120,90,20,.2);}
[data-theme="light"] .tb-btn.active{background:rgba(120,90,20,.12);border-color:rgba(120,90,20,.5);}
</style>
</head>

function ks(idx){idx=((idx%60)+60)%60;return GAN[idx%10]+ZHI[idx%12];}
function nc(idx){idx=((idx%60)+60)%60;return NACHIN[Math.floor(idx/2)];}

// 節入りDB
const SEKKI_DB={2025:{1:5,2:3,3:5,4:4,5:5,6:5,7:7,8:7,9:7,10:8,11:7,12:7},2026:{1:5,2:4,3:5,4:5,5:5,6:6,7:7,8:7,9:8,10:8,11:7,12:7},2027:{1:5,2:4,3:6,4:5,5:6,6:6,7:7,8:7,9:7,10:8,11:7,12:7},2028:{1:6,2:4,3:5,4:4,5:5,6:5,7:6,8:7,9:7,10:7,11:7,12:6}};
const SEKKI_KM={1:12,2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:8,10:9,11:10,12:11};
function getSekkiDay(y,m){if(SEKKI_DB[y])return SEKKI_DB[y][m];const A={1:6,2:4,3:6,4:5,5:6,6:6,7:7,8:7,9:8,10:8,11:7,12:7};return A[m];}
function getKD(y,mo,d){const sd=getSekkiDay(y,mo);if(d<sd){const pm=mo===1?12:mo-1;return{kY:mo<=2?y-1:y,kM:SEKKI_KM[pm]};}return{kY:mo===1?y-1:y,kM:SEKKI_KM[mo]};}

// 年干支インデックス
function yIdx(y){return((y-1984)%60+600)%60;}
// 月干支
function mIdx(y,m){const yi=yIdx(y);const bases=[2,14,26,38,50];const base=bases[(yi%10)%5];const zhi=(m===1)?11:m-2;return(base+zhi)%60;}
// 日干支（基準:2026-05-03=丁丑=13）
function dIdx(y,m,d){const ref=new Date(2026,4,3);const tgt=new Date(y,m-1,d);const diff=Math.round((tgt-ref)/86400000);return((13+diff)%60+600)%60;}

// 九星計算
function ds9(n){while(n>9){let s=0;while(n>0){s+=n%10;n=Math.floor(n/10);}n=s;}return n;}
function m9(x){const r=((x%9)+9)%9;return r===0?9:r;}
function red(v){if(v>=10)return v-9;if(v<=0)return v+9;return v;}
function calcHonmei(kY){return m9(11-ds9(kY));}
function calcTsukimei(h,kM){const b=[1,4,7].includes(h)?10:[2,5,8].includes(h)?13:16;return red(b-(kM+1));}

// 日盤の干支（NICHIBAN_ANCHORS使用）
const NICHIBAN_ANCHORS={
  2025:{yoto:{ref:new Date(2025,2,6),stem:1,branch:0,star:9,endDate:new Date(2025,5,21)},into:{ref:new Date(2025,5,22),stem:2,branch:1,star:8}},
  2026:{yoto:{ref:new Date(2026,2,4),stem:3,branch:1,star:2,endDate:new Date(2026,5,20)},into:{ref:new Date(2026,5,21),stem:2,branch:2,star:7}},
  2027:{yoto:{ref:new Date(2027,2,6),stem:5,branch:3,star:9,endDate:new Date(2027,5,21)},into:{ref:new Date(2027,5,22),stem:6,branch:4,star:8}},
  2028:{yoto:{ref:new Date(2028,2,5),stem:7,branch:5,star:7,endDate:new Date(2028,5,20)},into:{ref:new Date(2028,5,21),stem:8,branch:6,star:6}}
};
function _getDayData(y,mo,d){const t=new Date(y,mo-1,d);const a=NICHIBAN_ANCHORS[y];if(!a)return null;const useY=t<=a.yoto.endDate;const anc=useY?a.yoto:a.into;const diff=Math.round((t-anc.ref)/86400000);const stem=((anc.stem+diff)%10+10)%10;const branch=((anc.branch+diff)%12+12)%12;const star=useY?(((anc.star-1+diff)%9)+9)%9+1:(((anc.star-1-diff)%9)+9)%9+1;return{stem,branch,star};}
function getDayKanshi(y,m,d){const dd=_getDayData(y,m,d);if(!dd){const di=dIdx(y,m,d);return{kan:GAN[di%10],shi:ZHI[di%12]};}return{kan:KAN[dd.stem],shi:SHI[dd.branch]};}

let gStar={honmei:6,tsukimei:1,honmeiNachin:'天河水',tsukimeiNachin:'天河水',dayNachin:'大駅土'};
let curScene='朝の準備';

// ============================================================
// 描画
// ============================================================
function init(){
  // 日付（JST）
  const now=new Date();
  const jst=new Date(now.getTime()+9*3600000);
  const ty=jst.getUTCFullYear(),tm=jst.getUTCMonth()+1,td=jst.getUTCDate();
  const weekday=['日','月','火','水','木','金','土'];
  const wd=new Date(ty,tm-1,td).getDay();
  const dks=getDayKanshi(ty,tm,td);

  document.getElementById('todayDate').textContent=`${ty}年${tm}月${td}日（${weekday[wd]}）`;
  document.getElementById('todayKanshi').textContent=dks.kan+dks.shi;

  // 生年月日読込
  const b=localStorage.getItem('kitoku-birth')||localStorage.getItem('kitoku_birth');
  if(!b){document.getElementById('noData').style.display='block';return;}
  const arr=b.split('-').map(Number);
  const [by,bm,bd=1]=arr;
  if(!by||!bm){document.getElementById('noData').style.display='block';return;}

  const {kY,kM}=getKD(by,bm,bd);
  const h=calcHonmei(kY);
  const t=calcTsukimei(h,kM);
  const TAICHUU={1:9,9:1,2:6,6:2,3:7,7:3,4:8,8:4};
  const tFK=(h===t&&TAICHUU[t])?TAICHUU[t]:t;

  // 納音
  const yI=yIdx(by),mI=mIdx(by,bm),dI=dIdx(by,bm,bd);
  const yNac=nc(yI),mNac=nc(mI),dNac=nc(dI);

  gStar={honmei:h,tsukimei:tFK,honmeiNachin:yNac,tsukimeiNachin:mNac,dayNachin:dNac};

  document.getElementById('mainContent').style.display='block';

  // 各セクション描画
  drawKotoba(dks.kan,dks.shi,h,ty,tm,td);
  drawColor(h);
  drawKeyword(h,tFK);
  // 初期シーン（朝の準備）の香りを自動表示
  fetchScent();
}

// ① 今日の一言
function drawKotoba(kan,shi,honmei,ty,tm,td){
  const s=STAR_DATA[honmei]||{};
  const elemMsgs={
    水:'流れるように、しなやかに。今日は柔軟さが最大の武器です。',
    木:'新しい芽が出る日。一歩踏み出すことを恐れないで。',
    火:'光を当てる日。あなたの知性と直感が輝きます。',
    土:'大地のように静かに、しかし確実に積み上げる日です。',
    金:'天命の輝きを発揮する日。高い視点で物事を見渡して。'
  };
  document.getElementById('todayKotoba').textContent=
    `今日は${kan}${shi}の日。${s.elem||''}の気が満ちています。\n${elemMsgs[s.elem]||'今日も一歩一歩、着実に。'}`;
}

// ② 今日の色
function drawColor(honmei){
  const s=STAR_DATA[honmei]||{};
  const cols=s.colors||['#888'];
  // スウォッチ（グラデーション）
  const grad=`linear-gradient(135deg, ${cols.join(', ')})`;
  const sw=document.getElementById('colorSwatch');
  const isDark=document.documentElement.dataset.theme==='dark';
  sw.style.background=grad;
  sw.style.color=isDark?'rgba(255,255,255,.92)':'#5c4010';
  sw.style.textShadow=isDark?'0 1px 8px rgba(0,0,0,.45)':'0 1px 0 rgba(255,255,255,.35)';
  sw.style.boxShadow=isDark
    ? 'inset 0 0 0 999px rgba(10,12,24,.28)'
    : 'inset 0 0 0 999px rgba(255,255,255,.16)';
  sw.textContent=s.colorName||'—';
  document.getElementById('colorFashion').textContent=s.fashion||'—';
  document.getElementById('colorItem').textContent=s.items||'—';
  document.getElementById('colorWisdom').textContent=s.wisdom||'—';
}

}

async function fetchScent(){
  const result=document.getElementById('scentResult');
  document.getElementById('retryBtn').style.display='none';
  document.getElementById('affiliateRow').style.display='none';

  if(USE_API){
    // ── 将来のAPI切替用（USE_API=trueにするだけで動く）──
    const s=STAR_DATA[gStar.honmei]||{};
    result.innerHTML='<div class="scent-loading">✨ あなた専用の香りを選んでいます…</div>';
    try{
      const res=await fetch('/api/scent',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          honmei:s.j||'',elem:s.elem||'',
          honmeiNachin:gStar.honmeiNachin,
          tsukimeiNachin:gStar.tsukimeiNachin,
          dayNachin:gStar.dayNachin,
          scene:curScene
        })
      });
      const d=await res.json();
      renderScent(d);
    }catch(e){
      result.innerHTML='<div class="scent-loading" style="color:#b04040;">香りの提案を取得できませんでした</div>';
      document.getElementById('retryBtn').style.display='block';
    }
    return;
  }

  // ── 事前データから表示（現在の実装）──
  result.innerHTML='<div class="scent-loading">✨ 香りを選んでいます…</div>';
  setTimeout(()=>{
    const starData=SCENT_DATA[gStar.honmei];
    if(!starData){result.innerHTML='<div class="scent-loading">データを取得できませんでした</div>';return;}
    const d=starData[curScene];
    if(!d){result.innerHTML='<div class="scent-loading">データを取得できませんでした</div>';return;}
    renderScent(d);
  },600);
}

      ['香水で整える',`${name}は1プッシュまで。相手に届けるより、自分の集中と落ち着きを支える量に。`],
      ['ボディケアで整える','会議前はハンドクリームが使いやすいです。手元の所作が整うと、言葉の印象も落ち着きます。'],
      ['空間で整える','デスクや車内に控えめな香りを。商談前の数分を、呼吸を整える小さな準備時間にします。']
    ],
    'リラックス':[
      ['香水で整える',`${name}を寝る前の布や手首にほんの少し。強く纏うより、深呼吸のきっかけに。`],
      ['ボディケアで整える','入浴後のボディクリームやオイルに。体を労わる時間そのものを、今日の回復の儀式にします。'],
      ['空間で整える','寝室や読書スペースにディフューザーを。部屋の気配をゆるめ、休む許可を出す使い方。']
    ],
    '特別な日':[
      ['香水で整える',`${name}を耳の後ろや服の内側に。華やかさより、今日の自分らしさを支える香りとして。`],
      ['ボディケアで整える','外出前に同系統のクリームを下地に。香りの持続より、肌と気持ちの準備を大切に。'],
      ['空間で整える','出発前の部屋や車に香りを一吹き。特別な日の記憶と香りを、静かに結びます。']
    ]
  };
  return guides[curScene]||guides['朝の準備'];
}

function renderScent(d){
  const result=document.getElementById('scentResult');
  const useGuide=scentUseGuide(d).map(([label,text])=>`
    <div class="scent-use-card">
      <div class="scent-use-label">✦ ${label}</div>
      <div class="scent-use-text">${text}</div>
    </div>
  `).join('');
  result.innerHTML=`
    <div style="font-size:.6rem;letter-spacing:.1em;color:var(--gold);margin-bottom:6px;">✦ ${curScene}の香り</div>
    <div class="scent-name">${d.name||'—'}</div>
    <div style="font-size:.62rem;color:var(--mist);margin-bottom:8px;font-style:italic;">${d.keyword||''}</div>
    <div class="scent-reason">${d.reason||'—'}</div>
    <div class="scent-how">
      <div class="scent-how-label">✦ 取り入れ方</div>
      ${d.howto||'—'}
    </div>
    <div class="scent-use-grid">
      ${useGuide}
    </div>
    <div style="font-size:.65rem;color:var(--mist);line-height:1.9;">
      <span style="color:var(--gold);font-size:.55rem;letter-spacing:.1em;">✦ おすすめブランド</span><br>
      ${d.brand||'—'}
    </div>`;

  window._scentData={
    starName:STAR_DATA[gStar.honmei]?.j||'',
    nachinName:gStar.honmeiNachin,
    sceneName:curScene,
    scentName:d.name||'',
    celesKeyword:d.celes||'',
    brandName:d.brand||''
  };
}

// ④ キーワード
function drawKeyword(honmei,tsukimei){
  const s=STAR_DATA[honmei]||{};
  const kws=s.keywords||[];
  const kw=kws[Math.floor(Math.random()*kws.length)]||'今日も着実に';
  document.getElementById('todayKeyword').textContent='「 '+kw+' 」';
  document.getElementById('todayKeywordSub').textContent=s.kwSub||'';
}

// ============================================================
// 初期化
// ============================================================
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}

function setTheme(t){
  document.body.setAttribute('data-theme',t);document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('kitoku-theme',t);}catch(e){}
  ['dark','light'].forEach(x=>{const b=document.getElementById('tb-'+x);if(b)b.classList.toggle('active',x===t);});
  if(document.getElementById('colorSwatch'))drawColor(gStar.honmei);
}
function setFontSize(s){
  const m={s:'15px',m:'17px',l:'19px'};
  document.documentElement.style.fontSize=m[s]||'15px';
  try{localStorage.setItem('kitoku-fontsize',s);}catch(e){}
  ['s','m','l'].forEach(x=>{const b=document.getElementById('tb-'+x);if(b)b.classList.toggle('active',x===s);});
}
function openSettings(){const p=document.getElementById('settingPanel');if(p)p.style.display='flex';}
function closeSettings(){const p=document.getElementById('settingPanel');if(p)p.style.display='none';}
(function(){
  const t=localStorage.getItem('kitoku-theme')||'light';
  const fs=localStorage.getItem('kitoku-fontsize')||'s';
  document.addEventListener('DOMContentLoaded',function(){
    document.body.setAttribute('data-theme',t);document.documentElement.setAttribute('data-theme',t);
    ['dark','light'].forEach(x=>{const b=document.getElementById('tb-'+x);if(b)b.classList.toggle('active',x===t);});
    const fm={s:'15px',m:'17px',l:'19px'};
    document.documentElement.style.fontSize=fm[fs]||'15px';
    ['s','m','l'].forEach(x=>{const b=document.getElementById('tb-'+x);if(b)b.classList.toggle('active',x===fs);});
  });
})();

</script>
